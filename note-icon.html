<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0; height: 100%;
      background: transparent; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      -webkit-user-select: none; user-select: none;
    }
    /* 粉色笔记本 */
    .book {
      position: relative;
      width: 22px; height: 25px;
      background: #ff9ec4;
      border-radius: 3px 4px 4px 3px;
      border-left: 5px solid #ff7aa8;     /* 书脊 */
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      transition: transform 0.12s ease;
    }
    .book:hover { transform: scale(1.12); }
    .book:active { transform: scale(0.96); }
    /* 横线 */
    .book::before {
      content: '';
      position: absolute; left: 6px; right: 4px; top: 6px;
      height: 1.5px; border-radius: 1px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 5px 0 rgba(255, 255, 255, 0.9),
                  0 10px 0 rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="book" id="book" title="双击打开备忘录"></div>
  <script>
    // 双击放大打开备忘录
    document.getElementById('book').addEventListener('dblclick', () => window.noteAPI.open());
  </script>
</body>
</html>
