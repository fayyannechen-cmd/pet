<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .bubble {
      position: relative;
      margin-top: 8px;
      max-width: 200px;
      background: #ffffff;
      color: #444;
      border: 2px solid #e7a9a9;
      border-radius: 14px;
      padding: 8px 14px;
      font: 16px/1.3 -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      white-space: nowrap;
      -webkit-user-select: none;
      user-select: none;
    }

    /* 下方小尾巴，指向桌宠 */
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 9px solid #ffffff;
    }
  </style>
</head>
<body>
  <div class="bubble" id="bubble"></div>
  <script>
    const el = document.getElementById('bubble');
    window.bubbleAPI.onText((text) => { el.textContent = text; });
  </script>
</body>
</html>
