<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;   /* 整个页面透明 */
      overflow: hidden;
    }

    #pet {
      width: 100%;
      height: 100%;
      object-fit: contain;       /* 完整显示，不裁剪 */
      /* 保持像素锐利，不做模糊插值 */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;      /* 事件交给 window 统一处理 */
    }
  </style>
</head>
<body>
  <img id="pet" alt="pet" />

  <script>
    const BASE = 'assets/little-mao-puppy/frames';
    const SIZE = 160;

    const CLIPS = {
      idle: {
        frames: ['scratch/01.png','scratch/02.png','scratch/03.png','scratch/04.png','scratch/05.png','scratch/06.png'],
        fps: 8,
      },
      cheer: {   // 欢呼：待机时随机出现
        frames: ['cheer/01.png','cheer/02.png','cheer/03.png','cheer/04.png','cheer/05.png'],
        fps: 8,
      },
      walk: {
        frames: ['walk/01.png','walk/02.png','walk/03.png','walk/04.png','walk/05.png','walk/06.png','walk/07.png','walk/08.png'],
        fps: 10,
      },
      expression: {   // 表情：双击触发，只播一次
        frames: ['expressions/tearful.png','expressions/tearful-2.png','expressions/tearful-3.png','expressions/tearful-4.png'],
        fps: 5,
      },
    };

    const petImg = document.getElementById('pet');

    // 预加载所有帧，避免切换时闪烁
    for (const clip of Object.values(CLIPS)) {
      for (const f of clip.frames) {
        const img = new Image();
        img.src = `${BASE}/${f}`;
      }
    }

    let currentClip = 'idle';
    let currentFacing = 1;
    let frameIndex = 0;
    let timer = null;

    function startClip(name) {
      const clip = CLIPS[name];
      if (!clip) return;
      currentClip = name;
      frameIndex = 0;
      petImg.src = `${BASE}/${clip.frames[0]}`;
      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        frameIndex = (frameIndex + 1) % clip.frames.length;
        petImg.src = `${BASE}/${clip.frames[frameIndex]}`;
      }, 1000 / clip.fps);
    }

    // 播放指定次数的动画：播完停在最后一帧，不无限循环
    function playTimes(name, times) {
      const clip = CLIPS[name];
      if (!clip) return;
      currentClip = name;
      frameIndex = 0;
      let remaining = times;
      petImg.src = `${BASE}/${clip.frames[0]}`;
      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        frameIndex++;
        if (frameIndex >= clip.frames.length) {
          remaining--;
          if (remaining <= 0) {                  // 播够次数，停在最后一帧
            clearInterval(timer); timer = null;
            return;
          }
          frameIndex = 0;                        // 再来一轮
        }
        petImg.src = `${BASE}/${clip.frames[frameIndex]}`;
      }, 1000 / clip.fps);
    }

    function setFacing(facing) {
      currentFacing = facing;
      petImg.style.transform = facing === -1 ? 'scaleX(-1)' : 'scaleX(1)';
    }

    let paused = false;
    function setPaused(p) {
      paused = p;
      if (p) {
        if (timer) { clearInterval(timer); timer = null; }   // 冻结在当前帧
      } else {
        startClip(currentClip);                              // 恢复播放
      }
    }

    window.petAPI.onState((state) => {
      if (state.facing !== undefined) setFacing(state.facing);
      if (state.paused !== undefined) setPaused(state.paused);
      if (state.repeat && state.clip) { playTimes(state.clip, state.repeat); return; }   // 播指定次数
      if (state.clip && state.clip !== currentClip && !paused) startClip(state.clip);
    });

    startClip('idle');

    // ---- 判断鼠标是否点在狗的身体（不透明像素）上 ----
    // 把当前这一帧画到一张离屏画布上，读取鼠标位置的像素透明度
    const hitCanvas = document.createElement('canvas');
    hitCanvas.width = SIZE;
    hitCanvas.height = SIZE;
    const hitCtx = hitCanvas.getContext('2d', { willReadFrequently: true });

    function isOverBody(clientX, clientY) {
      try {
        // 画面如果左右翻转了，采样点的 x 也要跟着镜像
        const x = currentFacing === -1 ? SIZE - 1 - clientX : clientX;
        const y = clientY;
        if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return false;
        hitCtx.clearRect(0, 0, SIZE, SIZE);
        hitCtx.drawImage(petImg, 0, 0, SIZE, SIZE);
        const alpha = hitCtx.getImageData(x, y, 1, 1).data[3];
        return alpha > 20;   // 透明度足够高才算身体
      } catch (e) {
        return true;         // 万一读不到像素，宁可当作身体，保证还能拖
      }
    }

    let dragging = false;

    // 鼠标移动：没在拖动时，实时告诉主进程现在是否压在身体上（决定是否穿透）
    window.addEventListener('mousemove', (e) => {
      if (dragging) return;
      window.petAPI.setOverBody(isOverBody(e.clientX, e.clientY));
    });

    window.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (!isOverBody(e.clientX, e.clientY)) return;  // 点在透明区不处理（会穿透到桌面）
      dragging = true;
      window.petAPI.startDrag();
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      window.petAPI.endDrag();
    });

    // 右键点在身体上 -> 弹出原生菜单
    window.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (!isOverBody(e.clientX, e.clientY)) return;
      window.petAPI.openMenu();
    });

    // 双击身体 -> 播放一次表情动画
    window.addEventListener('dblclick', (e) => {
      if (!isOverBody(e.clientX, e.clientY)) return;
      window.petAPI.playExpression();
    });
  </script>
</body>
</html>
