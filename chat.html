<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --me: #0b93f6;        /* 我的气泡：iMessage 蓝 */
      --pet: #e9e9eb;       /* 桌宠气泡：浅灰 */
      --pet-text: #1c1c1e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      font: 15px/1.4 -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    /* 圆角卡片 */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
    }

    /* 顶部栏（可拖动整个窗口） */
    .header {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #ececec;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: saturate(180%) blur(20px);
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #f3e9dc;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .title { font-weight: 600; font-size: 15px; }
    .subtitle { font-size: 11px; color: #8e8e93; margin-top: 1px; }
    .spacer { flex: 1; }
    .close {
      -webkit-app-region: no-drag;
      width: 26px; height: 26px;
      border: none; border-radius: 50%;
      background: #f0f0f0; color: #666;
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close:hover { background: #e4e4e4; }

    /* 消息区 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #ffffff;
    }
    .row { display: flex; }
    .row.me { justify-content: flex-end; }
    .row.pet { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 8px 13px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
      -webkit-user-select: text;
      user-select: text;
      animation: pop 0.15s ease-out;
    }
    .me .bubble { background: var(--me); color: #fff; border-bottom-right-radius: 5px; }
    .pet .bubble { background: var(--pet); color: var(--pet-text); border-bottom-left-radius: 5px; }

    @keyframes pop {
      from { transform: scale(0.96); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* 正在输入的三个点 */
    .typing { display: flex; gap: 4px; align-items: center; padding: 11px 14px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #b0b0b5;
      animation: blink 1.2s infinite ease-in-out both;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    /* 底部输入栏 */
    .composer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #ececec;
      background: #fafafa;
    }
    #input {
      flex: 1;
      border: 1px solid #dcdcdc;
      border-radius: 18px;
      padding: 8px 14px;
      font: inherit;
      outline: none;
      background: #fff;
      -webkit-user-select: text;
      user-select: text;
    }
    #input:focus { border-color: #c5dcf5; }
    #send {
      width: 32px; height: 32px;
      border: none; border-radius: 50%;
      background: var(--me); color: #fff;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #send:disabled { background: #cfe3fb; cursor: default; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <img class="avatar" src="assets/little-mao-puppy/frames/wave/01.png" alt="" />
      <div>
        <div class="title">小狗</div>
        <div class="subtitle">在线</div>
      </div>
      <div class="spacer"></div>
      <button class="close" id="close" title="关闭">✕</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer">
      <input id="input" type="text" placeholder="说点什么…" autocomplete="off" />
      <button id="send" title="发送">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 20V5M12 5l-6 6M12 5l6 6" stroke="#fff" stroke-width="2.4"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function addBubble(text, who) {
      const row = document.createElement('div');
      row.className = `row ${who}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      messages.appendChild(row);
      scrollToBottom();
    }

    let typingRow = null;
    function showTyping() {
      if (typingRow) return;
      typingRow = document.createElement('div');
      typingRow.className = 'row pet';
      typingRow.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
      messages.appendChild(typingRow);
      scrollToBottom();
    }
    function hideTyping() {
      if (typingRow) { typingRow.remove(); typingRow = null; }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addBubble(text, 'me');
      input.value = '';
      showTyping();
      window.chatAPI.send(text);
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); sendMessage(); }
    });

    window.chatAPI.onReply((text) => {
      hideTyping();
      addBubble(text, 'pet');
    });

    document.getElementById('close').addEventListener('click', () => window.chatAPI.close());

    // 开场白
    addBubble('汪！想聊点什么？', 'pet');
    input.focus();
  </script>
</body>
</html>
