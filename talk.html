<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: transparent; overflow: hidden;
      font: 14px/1.4 -apple-system, "PingFang SC", sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    /* 苹果手机风格的胶囊输入条 */
    .bar {
      display: flex; align-items: center; gap: 8px;
      height: 44px; margin: 6px 8px;
      padding: 4px 4px 4px 16px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #e3e3e3;
      border-radius: 22px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
      backdrop-filter: saturate(180%) blur(16px);
    }
    #input {
      flex: 1; min-width: 0;
      border: none; outline: none; background: transparent;
      font-size: 14px; color: #1c1c1e;
      -webkit-user-select: text; user-select: text;
    }
    #input::placeholder { color: #b0b0b5; }
    #send {
      width: 34px; height: 34px; flex-shrink: 0;
      border: none; border-radius: 50%;
      background: #0b93f6; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #send:disabled { background: #cfe3fb; cursor: default; }
  </style>
</head>
<body>
  <div class="bar">
    <input id="input" type="text" placeholder="跟我说说话…" autocomplete="off" />
    <button id="send" title="发送">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 20V5M12 5l-6 6M12 5l6 6" stroke="#fff" stroke-width="2.4"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script>
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function send() {
      const text = input.value.trim();
      if (!text) return;
      window.talkAPI.send(text);
      input.value = '';
    }

    sendBtn.addEventListener('click', () => { send(); input.focus(); });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); send(); }
    });

    // 聚焦时让宠物停下来听你说话，失焦后恢复
    input.addEventListener('focus', () => window.talkAPI.focus());
    input.addEventListener('blur', () => window.talkAPI.blur());
  </script>
</body>
</html>
